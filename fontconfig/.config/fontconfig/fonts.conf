<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Monospace → JetBrainsMono NFM (Nerd Font Mono: single-width glyphs, strict alignment) -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>JetBrainsMono NFM</family>
    </prefer>
  </alias>

  <!-- Sans-serif → Noto Sans -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
    </prefer>
  </alias>

  <!-- Emoji → Noto Color Emoji (ensure emoji render in all GTK apps) -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
</fontconfig>
